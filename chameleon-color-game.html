<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>變色龍顏色大挑戰</title>
<style>
/* =====================================================
   ROOT VARS & RESET
   ===================================================== */
:root {
  --bg:#f0faf4; --card:#fff; --accent:#e05a5a; --accent2:#3dbfa8;
  --gold:#f7c948; --purple:#8b5cf6; --red:#ef4444; --green:#22c55e;
  --text:#2d2d2d; --text-mid:#6b7280;
  --shadow:0 8px 32px rgba(0,0,0,.13); --shadow-sm:0 3px 12px rgba(0,0,0,.09);
  --r:20px; --r-sm:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;
  font-family:'Nunito','Baloo 2','Comic Sans MS',cursive;
  background:var(--bg);user-select:none}

/* ── background leaves ── */
#bgLayer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.leaf{position:absolute;opacity:.12;animation:leafFloat linear infinite}
@keyframes leafFloat{
  0%  {transform:translateY(110vh) rotate(0deg);opacity:.12}
  100%{transform:translateY(-15vh) rotate(360deg);opacity:0}
}

/* ── app shell ── */
#app{
  position:relative;z-index:1;width:100%;max-width:700px;margin:0 auto;
  height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px;overflow:hidden;
}

/* =====================================================
   ANIMATIONS
   ===================================================== */
@keyframes popIn    {from{opacity:0;transform:scale(.65)}to{opacity:1;transform:scale(1)}}
@keyframes bounceY  {0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes wiggle   {0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
@keyframes fadeIn   {from{opacity:0}to{opacity:1}}
@keyframes countPop {from{opacity:0;transform:scale(2.4)}to{opacity:1;transform:scale(1)}}
@keyframes scoreBump{0%{transform:scale(1)}50%{transform:scale(1.65)}100%{transform:scale(1)}}
@keyframes wrongBump{0%{transform:scale(1)}50%{transform:scale(1.5);color:#ef4444}100%{transform:scale(1)}}
@keyframes urgentP  {0%,100%{opacity:1}50%{opacity:.25}}
@keyframes correctF {
  0%  {transform:scale(1);filter:brightness(1)}
  35% {transform:scale(1.6);filter:brightness(1.8) drop-shadow(0 0 16px #f7c948)}
  100%{transform:scale(1);filter:brightness(1)}
}
@keyframes wrongShk {
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-10px) rotate(-6deg)}
  40%{transform:translateX(10px) rotate(6deg)}
  60%{transform:translateX(-6px)}80%{transform:translateX(6px)}
}
@keyframes starFly{
  0%  {opacity:1;transform:translate(-50%,-50%) scale(.4)}
  65% {opacity:1;transform:translate(-50%,-140%) scale(1.5)}
  100%{opacity:0;transform:translate(-50%,-210%) scale(.7)}
}
@keyframes xFly{
  0%  {opacity:1;transform:translate(-50%,-50%) scale(.4)}
  65% {opacity:1;transform:translate(-50%,-120%) scale(1.3)}
  100%{opacity:0;transform:translate(-50%,-180%) scale(.6)}
}
@keyframes neonGlow {
  0%,100%{box-shadow:0 0 8px #8b5cf6,0 0 28px #8b5cf6,0 6px 0 #4c1d95}
  50%    {box-shadow:0 0 22px #c4b5fd,0 0 55px #8b5cf6,0 6px 0 #4c1d95}
}
@keyframes pulsRed  {
  0%,100%{box-shadow:0 6px 0 #b91c1c,0 10px 28px rgba(224,90,90,.4)}
  50%    {box-shadow:0 6px 0 #b91c1c,0 14px 48px rgba(224,90,90,.75)}
}
@keyframes colorPop {
  from{transform:scale(.35) rotate(-10deg);opacity:0}
  to  {transform:scale(1)   rotate(0);     opacity:1}
}

/* =====================================================
   START SCREEN
   ===================================================== */
#startScreen{
  display:flex;flex-direction:column;align-items:center;gap:13px;
  width:100%;animation:popIn .5s cubic-bezier(.175,.885,.32,1.275);
}
.title-mascot{animation:wiggle 2.2s ease-in-out infinite}
.game-title{
  font-size:clamp(1.7rem,6.5vw,2.8rem);color:var(--accent);text-align:center;line-height:1.2;
  text-shadow:3px 3px 0 var(--gold),6px 6px 0 rgba(0,0,0,.09);font-weight:900;
}
.color-bar{display:flex;gap:5px;justify-content:center;flex-wrap:wrap}
.color-dot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(0,0,0,.15);flex-shrink:0}

.mode-section{
  width:100%;background:var(--card);border-radius:var(--r);
  padding:13px 12px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px;
}
.section-lbl{font-size:clamp(.78rem,3.1vw,.98rem);color:var(--text-mid);font-weight:700;text-align:center}

/* ── 模式按鈕 ── */
.game-mode-btns{display:flex;gap:10px;justify-content:center}
.gm-btn{
  flex:1;max-width:210px;padding:11px 8px;border:3px solid transparent;border-radius:var(--r-sm);
  font-family:inherit;font-size:clamp(.82rem,3.1vw,1rem);font-weight:700;
  background:#f5f5f5;color:var(--text);
  box-shadow:0 4px 0 #d0d0d0,var(--shadow-sm);
  cursor:pointer;transition:all .15s;outline:none;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.gm-btn .gm-icon{width:42px;height:42px}
.gm-btn .gm-name{font-size:clamp(.9rem,3.4vw,1.05rem);font-weight:800}
/* FIX 1: 兩行說明 — 位置固定 / 位置移動 */
.gm-btn .gm-tag{
  font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:30px;
  background:rgba(0,0,0,.07);color:#666;
}
.gm-btn .gm-desc{font-size:.66rem;color:#aaa;text-align:center}
.gm-btn.active{
  background:linear-gradient(145deg,#3dbfa8,#0e9f8a);color:#fff;
  border-color:#0e9f8a;box-shadow:0 4px 0 #0a7d6c,var(--shadow-sm);transform:translateY(-2px);
}
.gm-btn.active .gm-tag{background:rgba(255,255,255,.25);color:#fff}
.gm-btn.active .gm-desc{color:#a7f3d0}
.gm-btn.chal-btn.active{
  background:linear-gradient(145deg,#8b5cf6,#6d28d9);border-color:#6d28d9;
  box-shadow:0 4px 0 #4c1d95,var(--shadow-sm),0 0 20px rgba(139,92,246,.4);
}
.gm-btn.chal-btn.active .gm-tag{background:rgba(255,255,255,.2);color:#fff}
.gm-btn.chal-btn.active .gm-desc{color:#ddd6fe}

/* ── 時間按鈕 ── */
.time-btns{display:flex;gap:8px;justify-content:center}
.time-btn{
  padding:8px 17px;border:none;border-radius:50px;
  font-family:inherit;font-size:clamp(.79rem,3.1vw,.94rem);font-weight:700;
  background:#f0f0f0;color:var(--text);box-shadow:0 4px 0 #c8c8c8;
  cursor:pointer;transition:all .15s;outline:none;
}
.time-btn.active,.time-btn:hover{background:var(--gold);color:#3a2a1a;transform:translateY(-2px);box-shadow:0 6px 0 #c4a800}
.time-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #c8c8c8}

/* ── 開始按鈕 ── */
.start-btn{
  display:flex;align-items:center;gap:9px;
  padding:14px 42px;border:none;border-radius:50px;
  font-family:inherit;font-size:clamp(1.05rem,4.6vw,1.55rem);font-weight:900;
  background:linear-gradient(145deg,#e05a5a,#c93232);color:#fff;letter-spacing:1px;
  box-shadow:0 6px 0 #b91c1c,0 12px 28px rgba(224,90,90,.4);
  cursor:pointer;transition:all .15s;outline:none;animation:pulsRed 1.9s ease-in-out infinite;
}
.start-btn:hover{transform:translateY(-3px)}
.start-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #b91c1c;animation:none}
.start-btn.chal{
  background:linear-gradient(145deg,#8b5cf6,#6d28d9);
  box-shadow:0 6px 0 #4c1d95,0 12px 28px rgba(139,92,246,.45);
  animation:neonGlow 1.9s ease-in-out infinite;
}
.btn-icon{width:26px;height:26px;flex-shrink:0}

/* =====================================================
   COUNTDOWN SCREEN
   ===================================================== */
#countdownScreen{
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;width:100%;
}
.cd-label{
  font-size:clamp(.93rem,3.7vw,1.18rem);color:var(--text-mid);font-weight:700;
  background:var(--card);padding:8px 20px;border-radius:50px;box-shadow:var(--shadow-sm);
  display:flex;align-items:center;gap:8px;
}
.cd-label svg{width:22px;height:22px;flex-shrink:0}
.cd-num{
  font-size:clamp(7rem,28vw,12rem);font-weight:900;color:var(--accent);line-height:1;
  text-shadow:4px 4px 0 var(--gold),8px 8px 0 rgba(0,0,0,.1);
  animation:countPop .78s cubic-bezier(.175,.885,.32,1.275);
}
.cd-num.go{color:#22c55e;font-size:clamp(4rem,16vw,8rem);text-shadow:4px 4px 0 #16a34a,8px 8px 0 rgba(0,0,0,.1)}

/* =====================================================
   GAME SCREEN
   ===================================================== */
#gameScreen{
  display:none;flex-direction:column;align-items:center;
  width:100%;gap:6px;height:100%;
}

/* ── header ── */
.game-hdr{
  width:100%;flex-shrink:0;
  display:flex;justify-content:space-between;align-items:center;
  background:var(--card);border-radius:var(--r);padding:7px 12px;box-shadow:var(--shadow-sm);
  gap:6px;
}
/* FIX 2: 正確 / 錯誤 各自計分區塊 */
.score-group{display:flex;gap:8px;align-items:center}
.hdr-box{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:44px}
.hdr-lbl{font-size:.62rem;color:var(--text-mid);font-weight:700;letter-spacing:.7px;white-space:nowrap}
.hdr-num{font-size:clamp(1.1rem,4.5vw,1.65rem);font-weight:900;color:var(--accent2)}
.hdr-num.correct-score{color:var(--green)}
.hdr-num.wrong-score{color:var(--red)}
.hdr-num.bump-ok  {animation:scoreBump .32s cubic-bezier(.175,.885,.32,1.275)}
.hdr-num.bump-err {animation:wrongBump .32s cubic-bezier(.175,.885,.32,1.275)}
.hdr-num.timer{color:var(--accent)}
.hdr-num.urgent{color:#ef4444;animation:urgentP .5s ease-in-out infinite}
.score-divider{width:1px;height:32px;background:#e5e7eb;flex-shrink:0}

.mode-pill{
  padding:4px 10px;border-radius:50px;font-size:.7rem;font-weight:700;
  background:var(--accent2);color:#fff;display:flex;align-items:center;gap:4px;white-space:nowrap;
}
.mode-pill svg{width:13px;height:13px}
.mode-pill.chal{background:var(--purple)}

/* ── 題目框（FIX 4）── */
.q-box{
  width:100%;flex-shrink:0;
  background:var(--card);border-radius:var(--r);padding:9px 14px;
  box-shadow:var(--shadow-sm);
}
.q-box.chal-q{background:#1e1b4b;border:2px solid var(--purple)}
.q-prompt{font-size:clamp(.82rem,3.3vw,1.05rem);color:var(--text-mid);font-weight:700;text-align:center;margin-bottom:5px}
.q-box.chal-q .q-prompt{color:#c4b5fd}

/* FIX 4: 顏色題目標籤 — 色塊 + 中文+注音 + 英文 */
.q-color-wrap{
  display:flex;align-items:center;justify-content:center;gap:10px;
  animation:colorPop .38s cubic-bezier(.175,.885,.32,1.275);
}
.q-swatch{
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  border:3px solid rgba(0,0,0,.18);
  box-shadow:0 3px 8px rgba(0,0,0,.18);
}
.q-labels{display:flex;flex-direction:column;align-items:flex-start;gap:1px}
.q-zh{
  font-size:clamp(1.1rem,4.8vw,1.55rem);font-weight:900;line-height:1.1;
  /* 中文 + 注音 使用 ruby */
}
.q-zh ruby{ruby-align:center}
.q-zh rt{font-size:.5em;color:inherit;opacity:.85}
.q-en{font-size:clamp(.72rem,2.8vw,.9rem);font-weight:700;letter-spacing:.5px;opacity:.72}
.chal-hint{font-size:.68rem;color:#c084fc;margin-top:3px;text-align:center}
.hidden{display:none!important}

/* ── 遊戲場地 ── */
#arena{
  position:relative;width:100%;flex:1;min-height:185px;
  background:linear-gradient(160deg,#e8f8ee 0%,#d4f0ff 55%,#fff4e8 100%);
  border-radius:var(--r);overflow:hidden;
  box-shadow:inset 0 2px 12px rgba(0,0,0,.07),var(--shadow);
}
#arena.chal-arena{background:linear-gradient(160deg,#0f0c29 0%,#1a1a3e 55%,#16213e 100%)}
#arena::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:24px;
  background:repeating-linear-gradient(90deg,#6dbf6d 0,#6dbf6d 18px,#5aab5a 18px,#5aab5a 36px);
  border-radius:0 0 var(--r) var(--r);z-index:0;pointer-events:none;
}
#arena.chal-arena::after{
  background:repeating-linear-gradient(90deg,#3730a3 0,#3730a3 18px,#312e81 18px,#312e81 36px);
}

/* ── 變色龍 ── */
.cham{position:absolute;cursor:pointer;z-index:2}
.cham:hover{filter:brightness(1.1)}
.cham.correct-f{animation:correctF .44s ease-out}
.cham.wrong-s{animation:wrongShk .42s ease-out}

/* ── 飛星 & 飛X特效 ── */
.starPop{position:fixed;pointer-events:none;z-index:999;animation:starFly .75s ease-out forwards}
.xPop   {position:fixed;pointer-events:none;z-index:999;animation:xFly   .65s ease-out forwards}

/* ── 底部控制 ── */
.btm-bar{
  width:100%;flex-shrink:0;
  display:flex;gap:10px;justify-content:center;padding:2px 0 3px;
}
.ctrl-btn{
  flex:1;max-width:160px;
  padding:10px 8px;border:none;border-radius:50px;
  font-family:inherit;font-size:clamp(.8rem,3.3vw,.98rem);font-weight:700;
  cursor:pointer;transition:all .15s;outline:none;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.ctrl-btn svg{width:17px;height:17px;flex-shrink:0}
.ctrl-btn:active{transform:translateY(3px)}
.btn-menu {background:var(--card);color:var(--text);box-shadow:0 5px 0 #d0cac0,var(--shadow-sm)}
.btn-menu:hover{background:#fef3e8}
.btn-pause{background:var(--gold);color:#3a2a1a;box-shadow:0 5px 0 #c4a800,var(--shadow-sm)}
.btn-pause:hover{background:#ffe033}

/* =====================================================
   PAUSE OVERLAY
   ===================================================== */
#pauseOverlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.68);backdrop-filter:blur(5px);
  align-items:center;justify-content:center;animation:fadeIn .2s;
}
#pauseOverlay.active{display:flex}
.pause-card{
  background:var(--card);border-radius:var(--r);padding:26px 34px;
  text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.3);
  animation:popIn .35s cubic-bezier(.175,.885,.32,1.275);
  display:flex;flex-direction:column;gap:13px;align-items:center;
  max-width:320px;width:90%;
}
.pause-title{font-size:clamp(1.4rem,5.8vw,2.2rem);color:var(--text);font-weight:900;display:flex;align-items:center;gap:8px;justify-content:center}
.pause-title svg{width:30px;height:30px}
.pause-info{font-size:clamp(.86rem,3.5vw,1.12rem);color:var(--text-mid);line-height:1.75}
.pause-info strong{color:var(--accent2);font-size:1.22em}
.pause-info .err{color:var(--red)}
.p-btn{
  width:210px;padding:12px;border:none;border-radius:50px;
  font-family:inherit;font-size:clamp(.9rem,3.7vw,1.08rem);font-weight:700;
  cursor:pointer;outline:none;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px;
}
.p-btn svg{width:19px;height:19px}
.p-btn:active{transform:translateY(2px)}
.p-resume{background:linear-gradient(145deg,#4ade80,#22c55e);color:#fff;box-shadow:0 5px 0 #15803d}
.p-resume:hover{transform:translateY(-2px)}
.p-quit{background:var(--card);color:var(--text-mid);box-shadow:0 5px 0 #d0cac0;border:2px solid #eee}
.p-quit:hover{background:#fef3e8}

/* =====================================================
   RESULT SCREEN
   ===================================================== */
#resultScreen{
  display:none;flex-direction:column;align-items:center;gap:12px;
  width:100%;animation:popIn .5s cubic-bezier(.175,.885,.32,1.275);
}
.res-mascot{animation:bounceY 1s ease-in-out infinite}
.res-card{
  background:var(--card);border-radius:var(--r);padding:18px 22px;
  box-shadow:var(--shadow);text-align:center;width:100%;max-width:370px;
}
.res-title{font-size:clamp(1.4rem,5.8vw,2.2rem);color:var(--gold);text-shadow:3px 3px 0 #d97706;margin-bottom:4px;font-weight:900}
.res-tag{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 12px;border-radius:50px;font-size:.76rem;font-weight:700;
  color:#fff;background:var(--accent2);margin-bottom:8px;
}
.res-tag svg{width:12px;height:12px}
.res-tag.chal{background:var(--purple)}

/* FIX 2: 結果畫面雙欄分數 */
.res-score-row{display:flex;gap:16px;justify-content:center;align-items:flex-end;margin:4px 0}
.res-score-col{display:flex;flex-direction:column;align-items:center;gap:1px}
.res-score-lbl{font-size:.72rem;font-weight:700;color:var(--text-mid)}
.res-score-num{
  font-size:clamp(2.4rem,11vw,4rem);font-weight:900;line-height:1;
}
.res-score-num.ok{color:var(--green);text-shadow:2px 2px 0 #15803d}
.res-score-num.err{color:var(--red);text-shadow:2px 2px 0 #b91c1c}
.res-divider{width:2px;height:52px;background:#e5e7eb;align-self:center}
.res-msg{font-size:clamp(.86rem,3.4vw,1.1rem);color:var(--text);margin-top:6px;font-weight:600}

.res-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%;max-width:370px}
.replay-btn{
  flex:1;min-width:118px;
  padding:12px 16px;border:none;border-radius:50px;
  font-family:inherit;font-size:clamp(.9rem,3.7vw,1.22rem);font-weight:700;
  background:linear-gradient(145deg,#3dbfa8,#0e9f8a);color:#fff;
  box-shadow:0 5px 0 #0a7d6c,0 10px 24px rgba(61,191,168,.35);
  cursor:pointer;transition:all .15s;outline:none;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.replay-btn svg{width:19px;height:19px}
.replay-btn:hover{transform:translateY(-2px)}
.replay-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #0a7d6c}
.menu-btn-res{
  flex:1;min-width:108px;
  padding:12px 14px;border:none;border-radius:50px;
  font-family:inherit;font-size:clamp(.87rem,3.4vw,1.08rem);font-weight:700;
  background:var(--card);color:var(--text);
  box-shadow:0 5px 0 #d0cac0,var(--shadow-sm);
  cursor:pointer;transition:all .15s;outline:none;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.menu-btn-res svg{width:17px;height:17px}
.menu-btn-res:hover{background:#fef3e8;transform:translateY(-2px)}
.menu-btn-res:active{transform:translateY(3px)}

/* =====================================================
   RESPONSIVE
   ===================================================== */
@media (orientation:landscape) and (min-width:600px){
  .mode-section{flex-direction:row;flex-wrap:wrap;align-items:flex-start;gap:12px 18px}
  .mode-section > .section-lbl{width:100%}
  .game-mode-btns{flex:1;min-width:200px}
  .time-btns-wrap{flex:1;min-width:160px;display:flex;flex-direction:column;gap:8px;justify-content:center}
  #startScreen{gap:9px}
  .game-title{font-size:clamp(1.4rem,3.8vw,2.3rem)}
}
@media (max-width:380px){
  #app{padding:6px}
  .game-hdr{padding:6px 9px}
  .q-swatch{width:32px;height:32px}
}
@media (max-height:560px){
  .game-title{font-size:1.35rem}
  .title-mascot svg{width:65px;height:65px}
}
</style>
</head>
<body>
<div id="bgLayer"></div>
<div id="app">

<!-- ================== START ================== -->
<div id="startScreen">
  <div class="title-mascot" id="titleMascot"></div>
  <div class="game-title">變色龍顏色大挑戰</div>
  <div class="color-bar" id="colorBar"></div>

  <div class="mode-section">
    <div class="section-lbl">選擇遊戲模式</div>
    <div class="game-mode-btns">
      <!-- FIX 1: 加上「位置固定」標籤 -->
      <button class="gm-btn active" data-mode="normal">
        <div class="gm-icon" id="iconNormal"></div>
        <span class="gm-name">標準模式</span>
        <span class="gm-tag">位置固定</span>
        <span class="gm-desc">安心辨色・穩定作答</span>
      </button>
      <!-- FIX 1: 加上「位置移動」標籤 -->
      <button class="gm-btn chal-btn" data-mode="challenge">
        <div class="gm-icon" id="iconChallenge"></div>

/* =====================================================

/* =====================================================
   Web Audio 音效
   ===================================================== */
let audioCtx=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function tone(f,d,t='sine',v=.25){
  try{const c=getCtx(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;
  g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
  o.start();o.stop(c.currentTime+d)}catch(e){}
}
const sfx={
  correct:()=>{tone(600,.1,'sine',.3);setTimeout(()=>tone(900,.12,'sine',.27),90);setTimeout(()=>tone(1200,.22,'sine',.24),185)},
  wrong:  ()=>{tone(300,.12,'sawtooth',.22);setTimeout(()=>tone(180,.2,'sawtooth',.18),110)},
  count:  (g)=>{if(g){tone(880,.08,'sine',.34);setTimeout(()=>tone(1100,.12,'sine',.34),80);setTimeout(()=>tone(1320,.28,'sine',.28),170)}else tone(440,.14,'sine',.24)},
  ready:  ()=>[350,440,550].forEach((f,i)=>setTimeout(()=>tone(f,.13,'sine',.21),i*110)),
  end:    ()=>[880,660,440,330].forEach((f,i)=>setTimeout(()=>tone(f,.2,'sine',.25),i*120)),
};

/* =====================================================

function runCountdown(){
  const el=document.getElementById('cdNum');
  const steps=[{t:'3'},{t:'2'},{t:'1'},{t:'GO!',g:true}];
  let i=0;
  (function next(){
    if(i>=steps.length){startGame();return}
    const s=steps[i++];
    el.className='cd-num'+(s.g?' go':'');
    el.textContent=s.t;
    el.style.animation='none';void el.offsetWidth;el.style.animation='';
    sfx.count(s.g);
    setTimeout(next,850);
  })();
}

  showScreen('game');

  setTimeout(()=>{
    const a=document.getElementById('arena');
    arenaW=a.clientWidth;
    const hh=(document.querySelector('.game-hdr')||{}).offsetHeight||58;
    const qh=(document.querySelector('.q-box')||{}).offsetHeight||72;

    a.style.height=arenaH+'px';
    a.className=isC?'chal-arena':'';
    a.id='arena';

    // 根據場地大小計算變色龍尺寸
    chamW=Math.min(94,Math.max(56,arenaW/6));
    chamH=Math.round(chamW*.95);

    spawn();
    pickColor();
    gameTimer=setInterval(tick,1000);
  },55);
}

function tick(){
  if(isPaused)return;
  timeLeft--;updateTimer();
  if(timeLeft<=0) endGame();
}

/* =====================================================
   FIX 3: 防重疊生成位置演算法
   使用碰撞排斥（rejection sampling），最多嘗試 60 次，
   確保每隻變色龍與已放置的不重疊超過 50%
   ===================================================== */
const OVERLAP_THRESH=0.5; // 允許的最大重疊比例

function noOverlapPos(placed){
  const margin=6;
  const maxX=Math.max(0,arenaW-chamW-margin*2);
  const maxY=Math.max(0,arenaH-chamH-34); // 34 = 草地

  const minDX=chamW*(1-OVERLAP_THRESH);
  const minDY=chamH*(1-OVERLAP_THRESH);

  for(let attempt=0;attempt<60;attempt++){
    const x=margin+Math.random()*maxX;
    const y=margin+Math.random()*maxY;
    let ok=true;
    for(const p of placed){
      if(Math.abs(x-p.x)<minDX && Math.abs(y-p.y)<minDY){ok=false;break}
    }
    if(ok) return{x,y};
  }
  // fallback：直接給一個隨機位置（場地太小時）
  return{x:margin+Math.random()*maxX,y:margin+Math.random()*maxY};
}

/* =====================================================
   生成變色龍
   ===================================================== */
function spawn(){
  const a=document.getElementById('arena');
  a.innerHTML='';chameleons=[];
  const n=5+Math.floor(Math.random()*4);
  const cols=randColors(n);
  const placed=[];

  cols.forEach(c=>{
    const pos=noOverlapPos(placed);
    placed.push(pos);

    const div=document.createElement('div');
    div.className='cham';
    div.style.left=pos.x+'px';div.style.top=pos.y+'px';
    div.style.width=chamW+'px';div.style.height=chamH+'px';
    div.innerHTML=buildCham(c.body,c.belly,chamW);
    div.dataset.c=c.name;
    div.addEventListener('click',onClik);
    a.appendChild(div);
    const ch={el:div,color:c,x:pos.x,y:pos.y};
    chameleons.push(ch);
    if(selMode==='challenge') startMove(ch);
  });
}

/* =====================================================
   標準模式：答對後整批重繪（FIX 3 防重疊）
   ===================================================== */
function respawn(){
  const n=chameleons.length;
  const cols=randColors(n);
  const placed=[];
  chameleons.forEach((ch,i)=>{
    const pos=noOverlapPos(placed);
    placed.push(pos);
    ch.el.style.transition='none';
    ch.el.style.left=pos.x+'px';ch.el.style.top=pos.y+'px';
    ch.x=pos.x;ch.y=pos.y;
    ch.color=cols[i];
    ch.el.dataset.c=ch.color.name;
    ch.el.innerHTML=buildCham(ch.color.body,ch.color.belly,chamW);
  });
}

/* =====================================================
   終極挑戰：移動時也做簡易防重疊
   ===================================================== */
function startMove(ch){
  const d=450+Math.random()*700;
  const tid=setInterval(()=>{
    if(!gameActive||isPaused)return;
    // 取得其他龍目前位置
    const others=chameleons.filter(c=>c!==ch).map(c=>{
      const cs=window.getComputedStyle(c.el);
      return{x:parseFloat(cs.left),y:parseFloat(cs.top)};
    });
    const pos=noOverlapPos(others);
    ch.el.style.transition=`left ${d*.88}ms ease-in-out,top ${d*.88}ms ease-in-out`;
    ch.el.style.left=pos.x+'px';ch.el.style.top=pos.y+'px';
    ch.x=pos.x;ch.y=pos.y;
  },d);
  moveTimers.push(tid);
}
function stopMoves(){
  moveTimers.forEach(t=>clearInterval(t));moveTimers=[];
  chameleons.forEach(ch=>{
    const cs=window.getComputedStyle(ch.el);
    ch.el.style.transition='none';
    ch.el.style.left=cs.left;ch.el.style.top=cs.top;
  });
}

/* =====================================================
   FIX 4: 出題 — 色塊 + 中文(注音) + 英文
   ===================================================== */
function pickColor(){
  const seen=new Set();
  const cands=chameleons.map(c=>c.color).filter(c=>{
    if(seen.has(c.name))return false;seen.add(c.name);return true;
  });
  currentColor=cands[Math.floor(Math.random()*cands.length)];

  // 色塊
  document.getElementById('qSwatch').style.background=currentColor.bg;

  // 中文 + 注音（ruby）
  const qZh=document.getElementById('qZh');
  qZh.style.color=currentColor.bg==='#e0e0e0'?'#555':currentColor.bg;
  qZh.innerHTML=`<ruby>${currentColor.name}色<rt>${currentColor.zhuyin}</rt></ruby>`;

  // 英文
  const qEn=document.getElementById('qEn');
  qEn.textContent=currentColor.en;
  qEn.style.color=currentColor.bg==='#e0e0e0'?'#888':currentColor.bg;

  // 重啟動畫
  const wrap=document.getElementById('qColorWrap');
  wrap.style.animation='none';void wrap.offsetWidth;wrap.style.animation='';
}

function ensureTarget(){
  if(chameleons.some(c=>c.color.name===currentColor.name))return;
  const idx=Math.floor(Math.random()*chameleons.length);
  chameleons[idx].color=currentColor;
  chameleons[idx].el.dataset.c=currentColor.name;
  chameleons[idx].el.innerHTML=buildCham(currentColor.body,currentColor.belly,chamW);
}

/* =====================================================
   點擊事件（FIX 2: 錯誤計分）
   ===================================================== */
function onClik(e){
  if(!gameActive||isPaused)return;
  const w=e.currentTarget;
  if(w.dataset.c===currentColor.name){
    scoreOk++;updateScore();sfx.correct();
    spawnStar(e.clientX,e.clientY);
    w.classList.remove('wrong-s');w.classList.add('correct-f');
    w.addEventListener('animationend',()=>w.classList.remove('correct-f'),{once:true});
    if(selMode==='normal'){
      setTimeout(()=>{if(!gameActive)return;respawn();pickColor();ensureTarget();},330);
    } else {
      setTimeout(()=>{if(!gameActive)return;pickColor();ensureTarget();},200);
    }
  } else {
    scoreErr++;updateScore();sfx.wrong();  // FIX 2: 錯誤也計數
    spawnX(e.clientX,e.clientY);
    w.classList.remove('correct-f');w.classList.add('wrong-s');
    w.addEventListener('animationend',()=>w.classList.remove('wrong-s'),{once:true});
  }
}

/* =====================================================
   特效
   ===================================================== */
function spawnStar(x,y){
  const clrs=['#f7c948','#f87171','#34d399','#60a5fa','#c084fc'];
  for(let i=0;i<3;i++){
    const s=document.createElement('div');s.className='starPop';
    const clr=clrs[i%5];
    s.innerHTML=`<svg viewBox="0 0 24 24" width="26" height="26" fill="${clr}">
      <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>`;
    s.style.left=(x+(Math.random()-.5)*36)+'px';s.style.top=y+'px';
    s.style.animationDelay=(i*76)+'ms';
    document.body.appendChild(s);setTimeout(()=>s.remove(),850);
  }
}
function spawnX(x,y){
  // 答錯：飛出紅色 X 符號
  const s=document.createElement('div');s.className='xPop';
  s.innerHTML=`<svg viewBox="0 0 24 24" width="28" height="28" stroke="#ef4444" stroke-width="3" stroke-linecap="round">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  s.style.left=(x+(Math.random()-.5)*20)+'px';s.style.top=y+'px';
  document.body.appendChild(s);setTimeout(()=>s.remove(),700);
}

/* =====================================================
   分數 & 計時
   ===================================================== */
function updateScore(){
  // 正確
  const ok=document.getElementById('scoreOk');
  ok.textContent=scoreOk;ok.classList.remove('bump-ok');void ok.offsetWidth;ok.classList.add('bump-ok');
  // 錯誤
  const err=document.getElementById('scoreErr');
  err.textContent=scoreErr;
  if(scoreErr>0){err.classList.remove('bump-err');void err.offsetWidth;err.classList.add('bump-err');}
}
function updateTimer(){
  const el=document.getElementById('timerNum');
  el.textContent=timeLeft;el.classList.toggle('urgent',timeLeft<=10);
}

/* =====================================================
   遊戲結束
   ===================================================== */
function endGame(){
  gameActive=false;isPaused=false;
  clearInterval(gameTimer);stopMoves();
  document.getElementById('pauseOverlay').classList.remove('active');
  sfx.end();
  const isC=selMode==='challenge';
  setTimeout(()=>{
    document.getElementById('finalOk').textContent=scoreOk;
    document.getElementById('finalErr').textContent=scoreErr;
    const tag=document.getElementById('resTag');
    tag.className='res-tag'+(isC?' chal':'');
    tag.innerHTML=isC?
      `<svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><polygon points="13,2 3,14 12,14 11,22 21,10 12,10"/></svg>終極挑戰`:
      `<svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><path d="M17 8C8 10 5.9 16.17 3.82 19.24L5.71 21l1-1C9 19 12 17 12 17s-2 2-2 5h2c0-3 2-5 5-7s3-7 0-7z"/></svg>標準模式`;
    document.getElementById('resMsg').textContent=getMsg(scoreOk,scoreErr,selTime,isC);
    const gold=COLORS[1];
    document.getElementById('resMascot').innerHTML=buildCham(gold.body,gold.belly,88);
    showScreen('result');
  },430);
}

function getMsg(ok,err,t,isC){
  const acc=ok+err>0?Math.round(ok/(ok+err)*100):0;
  const rate=ok/(t/10);
  const accStr=`正確率 ${acc}%`;
  if(isC) return rate>=5?`太驚人！終極變色龍王！${accStr}`:rate>=3?`超強！反應像閃電！${accStr}`:rate>=1.5?`厲害！終極不簡單！${accStr}`:`很棒！繼續挑戰！${accStr}`;
  return rate>=6?`超級厲害！變色龍大師！${accStr}`:rate>=4?`非常棒！反應超快！${accStr}`:rate>=2?`做得好！繼續加油！${accStr}`:`很棒！下次更好！${accStr}`;
}

/* =====================================================
   工具
   ===================================================== */
function randColors(n){
  const p=shuffle([...COLORS]);const r=p.slice(0,Math.min(n,10));
  while(r.length<n)r.push(COLORS[Math.floor(Math.random()*10)]);return r;
}
function shuffle(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
  return a;
}

/* =====================================================
   啟動
   ===================================================== */
initBg();initIcons();showScreen('start');
document.addEventListener('dblclick',e=>e.preventDefault());
document.addEventListener('touchstart',()=>{try{getCtx()}catch(e){}},{once:true});
</script>
