<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>變色龍顏色大挑戰</title>
<style>
/* =====================================================
   ROOT VARS & RESET
   ===================================================== */
:root {
  --bg:#f0faf4; --card:#fff; --accent:#e05a5a; --accent2:#3dbfa8;
  --gold:#f7c948; --purple:#8b5cf6; --red:#ef4444; --green:#22c55e;
  --text:#2d2d2d; --text-mid:#6b7280;
  --shadow:0 8px 32px rgba(0,0,0,.13); --shadow-sm:0 3px 12px rgba(0,0,0,.09);
  --r:20px; --r-sm:12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;
  font-family:'Nunito','Baloo 2','Comic Sans MS',cursive;
  background:var(--bg);user-select:none}

#bgLayer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.leaf{position:absolute;opacity:.12;animation:leafFloat linear infinite}
@keyframes leafFloat{0%{transform:translateY(110vh) rotate(0);opacity:.12}100%{transform:translateY(-15vh) rotate(360deg);opacity:0}}

#app{
  position:relative;z-index:1;width:100%;max-width:700px;margin:0 auto;
  height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px;overflow:hidden;
}

/* =====================================================
   ANIMATIONS
   ===================================================== */
@keyframes popIn    {from{opacity:0;transform:scale(.65)}to{opacity:1;transform:scale(1)}}
@keyframes bounceY  {0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes wiggle   {0%,100%{transform:rotate(-7deg)}50%{transform:rotate(7deg)}}
@keyframes fadeIn   {from{opacity:0}to{opacity:1}}
@keyframes countPop {from{opacity:0;transform:scale(2.4)}to{opacity:1;transform:scale(1)}}
@keyframes scoreBump{0%{transform:scale(1)}50%{transform:scale(1.65)}100%{transform:scale(1)}}
@keyframes wrongBump{0%{transform:scale(1)}50%{transform:scale(1.5);color:#ef4444}100%{transform:scale(1)}}
@keyframes urgentP  {0%,100%{opacity:1}50%{opacity:.25}}
@keyframes correctF {0%{transform:scale(1);filter:brightness(1)}35%{transform:scale(1.6);filter:brightness(1.8) drop-shadow(0 0 16px #f7c948)}100%{transform:scale(1);filter:brightness(1)}}
@keyframes wrongShk {0%,100%{transform:translateX(0)}20%{transform:translateX(-10px) rotate(-6deg)}40%{transform:translateX(10px) rotate(6deg)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
@keyframes starFly  {0%{opacity:1;transform:translate(-50%,-50%) scale(.4)}65%{opacity:1;transform:translate(-50%,-140%) scale(1.5)}100%{opacity:0;transform:translate(-50%,-210%) scale(.7)}}
@keyframes xFly     {0%{opacity:1;transform:translate(-50%,-50%) scale(.4)}65%{opacity:1;transform:translate(-50%,-120%) scale(1.3)}100%{opacity:0;transform:translate(-50%,-180%) scale(.6)}}
@keyframes pulsRed  {0%,100%{box-shadow:0 6px 0 #b91c1c,0 10px 28px rgba(224,90,90,.4)}50%{box-shadow:0 6px 0 #b91c1c,0 14px 48px rgba(224,90,90,.75)}}
@keyframes pulsOrange{0%,100%{box-shadow:0 6px 0 #b45309,0 10px 28px rgba(245,158,11,.4)}50%{box-shadow:0 6px 0 #b45309,0 14px 48px rgba(245,158,11,.75)}}
@keyframes pulsViolet{0%,100%{box-shadow:0 0 8px #8b5cf6,0 0 28px #8b5cf6,0 6px 0 #4c1d95}50%{box-shadow:0 0 22px #c4b5fd,0 0 55px #8b5cf6,0 6px 0 #4c1d95}}
@keyframes colorPop {from{transform:scale(.35) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
@keyframes audioWave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.6)}}
/* sub-mode card slide-in */
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}

/* =====================================================
   CHALLENGE SPEED SELECT SCREEN
   ===================================================== */
#chalSpeedScreen{
  position:relative;
  display:none;flex-direction:column;align-items:center;gap:16px;
  width:100%;animation:popIn .4s cubic-bezier(.175,.885,.32,1.275);
}
.spd-mascot{animation:wiggle 2.2s ease-in-out infinite}
.spd-title{
  font-size:clamp(1.6rem,6.5vw,2.6rem);font-weight:900;color:var(--purple);
  text-shadow:3px 3px 0 #ddd6fe,5px 5px 0 rgba(0,0,0,.08);
}
.spd-sub{font-size:clamp(.85rem,3.4vw,1.1rem);color:var(--text-mid);font-weight:700}
.spd-cards{display:flex;gap:14px;justify-content:center;width:100%}
.spd-card{
  flex:1;max-width:220px;
  padding:18px 12px;border:3px solid transparent;border-radius:var(--r);
  font-family:inherit;cursor:pointer;transition:all .18s;outline:none;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  background:#f5f5f5;color:var(--text);
  box-shadow:0 6px 0 #d0d0d0,var(--shadow);
}
.spd-card:hover{transform:translateY(-4px)}
.spd-card:active{transform:translateY(3px);box-shadow:0 3px 0 #d0d0d0}
.spd-card-icon{width:52px;height:52px;display:flex;align-items:center;justify-content:center}
.spd-card-icon svg{width:42px;height:42px}
.spd-card-name{font-size:clamp(1rem,4.2vw,1.35rem);font-weight:900}
.spd-card-tag{font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:30px;background:rgba(0,0,0,.07);color:#666}
.spd-card-desc{font-size:.72rem;color:#999;text-align:center;line-height:1.5}
/* 慢速卡：橘色調 */
.slow-card{border-color:#fed7aa}
.slow-card:hover{background:linear-gradient(145deg,#fff7ed,#fef3c7);border-color:#f59e0b;box-shadow:0 6px 0 #b45309,var(--shadow)}
.slow-card:hover .spd-card-name{color:#d97706}
.slow-card:hover .spd-card-tag{background:#fef3c7;color:#b45309}
/* 快速卡：紫色調 */
.fast-card{border-color:#ddd6fe}
.fast-card:hover{background:linear-gradient(145deg,#faf5ff,#ede9fe);border-color:#8b5cf6;box-shadow:0 6px 0 #4c1d95,var(--shadow)}
.fast-card:hover .spd-card-name{color:#7c3aed}
.fast-card:hover .spd-card-tag{background:#ede9fe;color:#6d28d9}

.spd-back-btn{
  display:flex;align-items:center;gap:6px;
  padding:10px 24px;border:none;border-radius:50px;
  font-family:inherit;font-size:clamp(.85rem,3.4vw,1rem);font-weight:700;
  background:var(--card);color:var(--text-mid);
  box-shadow:0 4px 0 #d0cac0,var(--shadow-sm);
  cursor:pointer;transition:all .15s;outline:none;
}
.spd-back-btn:hover{background:#fef3e8;transform:translateY(-2px)}
.spd-back-btn:active{transform:translateY(2px)}

/* =====================================================
   AUDIO TOGGLE BUTTONS (top-right of start screen)
   ===================================================== */
.audio-controls{
  position:absolute;top:12px;right:14px;
  display:flex;gap:8px;z-index:10;
}
.audio-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:7px 10px;border:none;border-radius:var(--r-sm);
  background:var(--card);box-shadow:var(--shadow-sm);
  cursor:pointer;transition:all .15s;outline:none;
  font-family:inherit;font-size:.62rem;font-weight:700;color:var(--text-mid);
  min-width:52px;
}
.audio-btn svg{width:22px;height:22px}
.audio-btn.on { background:#f0fdf4;color:#15803d;box-shadow:0 3px 0 #16a34a,var(--shadow-sm)}
.audio-btn.off{ background:#fef2f2;color:#dc2626;box-shadow:0 3px 0 #b91c1c,var(--shadow-sm)}
.audio-btn:active{transform:translateY(2px)}
/* tiny wave bars for music icon */
.wave-bars{display:flex;gap:2px;align-items:flex-end;height:16px}
.wave-bars span{
  width:3px;border-radius:2px;background:currentColor;
  animation:audioWave .8s ease-in-out infinite;
}
.wave-bars span:nth-child(2){animation-delay:.15s;height:10px}
.wave-bars span:nth-child(3){animation-delay:.3s;height:14px}
.wave-bars span:nth-child(1){height:7px}
.wave-bars span:nth-child(4){height:9px;animation-delay:.45s}
.audio-btn.off .wave-bars span{animation:none;opacity:.4}

/* =====================================================
   START SCREEN
   ===================================================== */
#startScreen{
  position:relative;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  width:100%;animation:popIn .5s cubic-bezier(.175,.885,.32,1.275);
}
.title-mascot{animation:wiggle 2.2s ease-in-out infinite}
.game-title{
  font-size:clamp(1.7rem,6.5vw,2.8rem);color:var(--accent);text-align:center;line-height:1.2;
  text-shadow:3px 3px 0 var(--gold),6px 6px 0 rgba(0,0,0,.09);font-weight:900;
}
.color-bar{display:flex;gap:5px;justify-content:center;flex-wrap:wrap}
.color-dot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(0,0,0,.15);flex-shrink:0}

.mode-section{
  width:100%;background:var(--card);border-radius:var(--r);
  padding:12px 12px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:10px;
}
.section-lbl{font-size:clamp(.78rem,3.1vw,.98rem);color:var(--text-mid);font-weight:700;text-align:center}

/* ── 模式按鈕 ── */
.game-mode-btns{display:flex;gap:10px;justify-content:center}
.gm-btn{
  flex:1;max-width:210px;padding:10px 8px;border:3px solid transparent;border-radius:var(--r-sm);
  font-family:inherit;font-size:clamp(.82rem,3.1vw,1rem);font-weight:700;
  background:#f5f5f5;color:var(--text);
  box-shadow:0 4px 0 #d0d0d0,var(--shadow-sm);
  cursor:pointer;transition:all .15s;outline:none;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.gm-btn .gm-icon{width:40px;height:40px}
.gm-btn .gm-name{font-size:clamp(.88rem,3.3vw,1.04rem);font-weight:800}
.gm-btn .gm-tag{font-size:.72rem;font-weight:700;padding:2px 8px;border-radius:30px;background:rgba(0,0,0,.07);color:#666}
.gm-btn .gm-desc{font-size:.65rem;color:#aaa;text-align:center}
.gm-btn.active{
  background:linear-gradient(145deg,#3dbfa8,#0e9f8a);color:#fff;
  border-color:#0e9f8a;box-shadow:0 4px 0 #0a7d6c,var(--shadow-sm);transform:translateY(-2px);
}
.gm-btn.active .gm-tag{background:rgba(255,255,255,.25);color:#fff}
.gm-btn.active .gm-desc{color:#a7f3d0}
.gm-btn.chal-btn.active{
  background:linear-gradient(145deg,#8b5cf6,#6d28d9);border-color:#6d28d9;
  box-shadow:0 4px 0 #4c1d95,var(--shadow-sm),0 0 20px rgba(139,92,246,.4);
}
.gm-btn.chal-btn.active .gm-tag{background:rgba(255,255,255,.2);color:#fff}
.gm-btn.chal-btn.active .gm-desc{color:#ddd6fe}

/* ── 時間按鈕 ── */
.time-btns{display:flex;gap:8px;justify-content:center}
.time-btn{
  padding:8px 17px;border:none;border-radius:50px;
  font-family:inherit;font-size:clamp(.79rem,3.1vw,.94rem);font-weight:700;
  background:#f0f0f0;color:var(--text);box-shadow:0 4px 0 #c8c8c8;
  cursor:pointer;transition:all .15s;outline:none;
}
.time-btn.active,.time-btn:hover{background:var(--gold);color:#3a2a1a;transform:translateY(-2px);box-shadow:0 6px 0 #c4a800}
.time-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #c8c8c8}

/* ── 開始按鈕 ── */
.start-btn{
  display:flex;align-items:center;gap:9px;
  padding:14px 42px;border:none;border-radius:50px;
  font-family:inherit;font-size:clamp(1.05rem,4.6vw,1.55rem);font-weight:900;
  background:linear-gradient(145deg,#e05a5a,#c93232);color:#fff;letter-spacing:1px;
  box-shadow:0 6px 0 #b91c1c,0 12px 28px rgba(224,90,90,.4);
  cursor:pointer;transition:all .15s;outline:none;animation:pulsRed 1.9s ease-in-out infinite;
}
.start-btn:hover{transform:translateY(-3px)}
.start-btn:active{transform:translateY(3px);box-shadow:0 3px 0 #b91c1c;animation:none}
.start-btn.chal-slow{
  background:linear-gradient(145deg,#f59e0b,#d97706);
  box-shadow:0 6px 0 #b45309,0 12px 28px rgba(245,158,11,.45);
  animation:pulsOrange 1.9s ease-in-out infinite;
}
.start-btn.chal-fast{
  background:linear-gradient(145deg,#8b5cf6,#6d28d9);
  box-shadow:0 6px 0 #4c1d95,0 12px 28px rgba(139,92,246,.45);
  animation:pulsViolet 1.9s ease-in-out infinite;
}
.btn-icon{width:26px;height:26px;flex-shrink:0}

/* =====================================================
   COUNTDOWN
   ===================================================== */
#countdownScreen{
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;width:100%;
}
.cd-label{
  font-size:clamp(.93rem,3.7vw,1.18rem);color:var(--text-mid);font-weight:700;
  background:var(--card);padding:8px 20px;border-radius:50px;box-shadow:var(--shadow-sm);
  display:flex;align-items:center;gap:8px;
}
.cd-label svg{width:22px;height:22px;flex-shrink:0}
.cd-num{
  font-size:clamp(7rem,28vw,12rem);font-weight:900;color:var(--accent);line-height:1;
  text-shadow:4px 4px 0 var(--gold),8px 8px 0 rgba(0,0,0,.1);
  animation:countPop .78s cubic-bezier(.175,.885,.32,1.275);
}
.cd-num.go{color:#22c55e;font-size:clamp(4rem,16vw,8rem);text-shadow:4px 4px 0 #16a34a,8px 8px 0 rgba(0,0,0,.1)}

/* =====================================================
   GAME SCREEN
   ===================================================== */
#gameScreen{display:none;flex-direction:column;align-items:center;width:100%;gap:6px;height:100%}

.game-hdr{
  width:100%;flex-shrink:0;
  display:flex;justify-content:space-between;align-items:center;
  background:var(--card);border-radius:var(--r);padding:7px 12px;box-shadow:var(--shadow-sm);gap:6px;
}
.score-group{display:flex;gap:8px;align-items:center}
.hdr-box{display:flex;flex-direction:column;align-items:center;gap:1px;min-width:40px}
.hdr-lbl{font-size:.62rem;color:var(--text-mid);font-weight:700;letter-spacing:.7px;white-space:nowrap}
.hdr-num{font-size:clamp(1.1rem,4.5vw,1.65rem);font-weight:900;color:var(--accent2)}
.hdr-num.correct-score{color:var(--green)}
.hdr-num.wrong-score{color:var(--red)}
.hdr-num.bump-ok  {animation:scoreBump .32s cubic-bezier(.175,.885,.32,1.275)}
.hdr-num.bump-err {animation:wrongBump .32s cubic-bezier(.175,.885,.32,1.275)}
.hdr-num.timer{color:var(--accent)}
.hdr-num.urgent{color:#ef4444;animation:urgentP .5s ease-in-out infinite}
.score-divider{width:1px;height:30px;background:#e5e7eb;flex-shrink:0}
.mode-pill{
  padding:4px 10px;border-radius:50px;font-size:.68rem;font-weight:700;
  background:var(--accent2);color:#fff;display:flex;align-items:center;gap:4px;white-space:nowrap;
}
.mode-pill svg{width:12px;height:12px}
.mode-pill.chal-slow{background:#f59e0b}
.mode-pill.chal-fast{background:var(--purple)}

/* ── 題目框 ── */
.q-box{
  width:100%;flex-shrink:0;
  background:var(--card);border-radius:var(--r);padding:9px 14px;
  box-shadow:var(--shadow-sm);
}
.q-prompt{font-size:clamp(.8rem,3.2vw,1rem);color:var(--text-mid);font-weight:700;text-align:center;margin-bottom:5px}
.q-color-wrap{
  display:flex;align-items:center;justify-content:center;gap:10px;
  animation:colorPop .38s cubic-bezier(.175,.885,.32,1.275);
}
.q-swatch{
  width:38px;height:38px;border-radius:10px;flex-shrink:0;
  border:3px solid rgba(0,0,0,.18);box-shadow:0 3px 8px rgba(0,0,0,.18);
}
.q-labels{display:flex;flex-direction:column;align-items:flex-start;gap:1px}
.q-zh{font-size:clamp(1.1rem,4.8vw,1.55rem);font-weight:900;line-height:1.1}
.q-zh ruby{ruby-align:center}
.q-zh rt{font-size:.5em;color:inherit;opacity:.85}
.q-en{font-size:clamp(.72rem,2.8vw,.9rem);font-weight:700;letter-spacing:.5px;opacity:.72}
.chal-hint{font-size:.68rem;color:#d97706;margin-top:3px;text-align:center}
.chal-hint.fast{color:#8b5cf6}
.hidden{display:none!important}

/* ── 遊戲場地 ── (FIX 1: 終極模式也用淺色背景) ── */
#arena{
  position:relative;width:100%;flex:1;min-height:185px;
  background:linear-gradient(160deg,#e8f8ee 0%,#d4f0ff 55%,#fff4e8 100%);
  border-radius:var(--r);overflow:hidden;
  box-shadow:inset 0 2px 12px rgba(0,0,0,.07),var(--shadow);
}
/* 慢速：偏暖橘調淺色 */
#arena.arena-slow{
  background:linear-gradient(160deg,#fef9ee 0%,#fef3c7 50%,#fff7e8 100%);
}
/* 快速：偏紫調淺色（仍是亮色，不是深色） */
#arena.arena-fast{
  background:linear-gradient(160deg,#f5f3ff 0%,#ede9fe 50%,#faf5ff 100%);
}
/* 草地（統一綠色） */
#arena::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:24px;
  background:repeating-linear-gradient(90deg,#6dbf6d 0,#6dbf6d 18px,#5aab5a 18px,#5aab5a 36px);
  border-radius:0 0 var(--r) var(--r);z-index:0;pointer-events:none;
}
#arena.arena-slow::after{
  background:repeating-linear-gradient(90deg,#fbbf24 0,#fbbf24 18px,#f59e0b 18px,#f59e0b 36px);
}
#arena.arena-fast::after{
  background:repeating-linear-gradient(90deg,#a78bfa 0,#a78bfa 18px,#8b5cf6 18px,#8b5cf6 36px);
}

.cham{position:absolute;cursor:pointer;z-index:2}
.cham:hover{filter:brightness(1.1)}
.cham.correct-f{animation:correctF .44s ease-out}
.cham.wrong-s{animation:wrongShk .42s ease-out}

.starPop{position:fixed;pointer-events:none;z-index:999;animation:starFly .75s ease-out forwards}
.xPop   {position:fixed;pointer-events:none;z-index:999;animation:xFly   .65s ease-out forwards}

.btm-bar{width:100%;flex-shrink:0;display:flex;gap:10px;justify-content:center;padding:2px 0 3px}
.ctrl-btn{
  flex:1;max-width:160px;padding:10px 8px;border:none;border-radius:50px;
  font-family:inherit;font-size:clamp(.8rem,3.3vw,.98rem);font-weight:700;
  cursor:pointer;transition:all .15s;outline:none;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.ctrl-btn svg{width:17px;height:17px;flex-shrink:0}
.ctrl-btn:active{transform:translateY(3px)}
.btn-menu {background:var(--card);color:var(--text);box-shadow:0 5px 0 #d0cac0,var(--shadow-sm)}
.btn-menu:hover{background:#fef3e8}
.btn-pause{background:var(--gold);color:#3a2a1a;box-shadow:0 5px 0 #c4a800,var(--shadow-sm)}
.btn-pause:hover{background:#ffe033}

/* =====================================================
   PAUSE OVERLAY
   ===================================================== */
#pauseOverlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.68);backdrop-filter:blur(5px);
  align-items:center;justify-content:center;animation:fadeIn .2s;
}
#pauseOverlay.active{display:flex}
.pause-card{
  background:var(--card);border-radius:var(--r);padding:26px 32px;
  text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.3);
  animation:popIn .35s cubic-bezier(.175,.885,.32,1.275);
  display:flex;flex-direction:column;gap:13px;align-items:center;max-width:320px;width:90%;
}
.pause-title{font-size:clamp(1.4rem,5.8vw,2.2rem);color:var(--text);font-weight:900;display:flex;align-items:center;gap:8px;justify-content:center}
.pause-title svg{width:30px;height:30px}
.pause-info{font-size:clamp(.86rem,3.5vw,1.12rem);color:var(--text-mid);line-height:1.75}
.pause-info strong{color:var(--accent2);font-size:1.22em}
.pause-info .err{color:var(--red)}
.p-btn{
  width:210px;padding:12px;border:none;border-radius:50px;
  font-family:inherit;font-size:clamp(.9rem,3.7vw,1.08rem);font-weight:700;
  cursor:pointer;outline:none;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:7px;
}
.p-btn svg{width:19px;height:19px}
.p-btn:active{transform:translateY(2px)}
.p-resume{background:linear-gradient(145deg,#4ade80,#22c55e);color:#fff;box-shadow:0 5px 0 #15803d}
.p-resume:hover{transform:translateY(-2px)}
.p-quit{background:var(--card);color:var(--text-mid);box-shadow:0 5px 0 #d0cac0;border:2px solid #eee}
.p-quit:hover{background:#fef3e8}

/* =====================================================
   RESULT SCREEN
   ===================================================== */
#resultScreen{display:none;flex-direction:column;align-items:center;gap:12px;width:100%;animation:popIn .5s cubic-bezier(.175,.885,.32,1.275)}
.res-mascot{animation:bounceY 1s ease-in-out infinite}
.res-card{background:var(--card);border-radius:var(--r);padding:18px 22px;box-shadow:var(--shadow);text-align:center;width:100%;max-width:370px}
.res-title{font-size:clamp(1.4rem,5.8vw,2.2rem);color:var(--gold);text-shadow:3px 3px 0 #d97706;margin-bottom:4px;font-weight:900}
.res-tag{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 12px;border-radius:50px;font-size:.76rem;font-weight:700;
  color:#fff;background:var(--accent2);margin-bottom:8px;
}
.res-tag svg{width:12px;height:12px}
.res-tag.chal-slow{background:#f59e0b}
.res-tag.chal-fast{background:var(--purple)}
.res-score-row{display:flex;gap:16px;justify-content:center;align-items:flex-end;margin:4px 0}
.res-score-col{display:flex;flex-direction:column;align-items:center;gap:1px}
.res-score-lbl{font-size:.72rem;font-weight:700;color:var(--text-mid)}
.res-score-num{font-size:clamp(2.4rem,11vw,4rem);font-weight:900;line-height:1}
.res-score-num.ok {color:var(--green);text-shadow:2px 2px 0 #15803d}
.res-score-num.err{color:var(--red);text-shadow:2px 2px 0 #b91c1c}
.res-divider{width:2px;height:50px;background:#e5e7eb;align-self:center}
.res-msg{font-size:clamp(.86rem,3.4vw,1.1rem);color:var(--text);margin-top:6px;font-weight:600}
.res-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%;max-width:370px}
.replay-btn{
  flex:1;min-width:118px;padding:12px 16px;border:none;border-radius:50px;
  font-family:inherit;font-size:clamp(.9rem,3.7vw,1.22rem);font-weight:700;
  background:linear-gradient(145deg,#3dbfa8,#0e9f8a);color:#fff;
  box-shadow:0 5px 0 #0a7d6c,0 10px 24px rgba(61,191,168,.35);
  cursor:pointer;transition:all .15s;outline:none;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.replay-btn svg{width:19px;height:19px}
.replay-btn:hover{transform:translateY(-2px)}
.replay-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #0a7d6c}
.menu-btn-res{
  flex:1;min-width:108px;padding:12px 14px;border:none;border-radius:50px;
  font-family:inherit;font-size:clamp(.87rem,3.4vw,1.08rem);font-weight:700;
  background:var(--card);color:var(--text);
  box-shadow:0 5px 0 #d0cac0,var(--shadow-sm);
  cursor:pointer;transition:all .15s;outline:none;
  display:flex;align-items:center;justify-content:center;gap:5px;
}
.menu-btn-res svg{width:17px;height:17px}
.menu-btn-res:hover{background:#fef3e8;transform:translateY(-2px)}
.menu-btn-res:active{transform:translateY(3px)}

/* =====================================================
   RESPONSIVE
   ===================================================== */
@media (orientation:landscape) and (min-width:600px){
  .mode-section{flex-direction:row;flex-wrap:wrap;align-items:flex-start;gap:10px 18px}
  .mode-section > .section-lbl{width:100%}
  .game-mode-btns{flex:1;min-width:200px}
  #chalSubRow{flex:1;min-width:200px}
  .time-btns-wrap{flex:1;min-width:160px;display:flex;flex-direction:column;gap:8px;justify-content:center}
  #startScreen{gap:8px}
  .game-title{font-size:clamp(1.4rem,3.8vw,2.3rem)}
}
@media (max-width:380px){
  #app{padding:6px}
  .game-hdr{padding:6px 9px}
  .q-swatch{width:32px;height:32px}
  .audio-controls{top:8px;right:8px}
  .audio-btn{min-width:44px;padding:5px 7px}
}
@media (max-height:560px){
  .game-title{font-size:1.35rem}
  .title-mascot svg{width:65px;height:65px}
}
</style>
</head>
<body>
<div id="bgLayer"></div>
<div id="app">

<!-- ================== START ================== -->
<div id="startScreen">

  <div class="title-mascot" id="titleMascot"></div>

    </div>

    <div class="section-lbl">選擇時間</div>

  <button class="start-btn" id="startBtn">

<!-- ================== CHALLENGE SPEED SELECT ================== -->
<div id="chalSpeedScreen">

<!-- ================== COUNTDOWN ================== -->

  <div class="res-card">
    <div class="res-title">遊戲結束！</div>

      <div class="res-score-col">

</div><!-- #app -->

<!-- ================== PAUSE OVERLAY ================== -->
<div id="pauseOverlay">
  <div class="pause-card">
    <div class="pause-title">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>

      回到選單
    </button>
  </div>
</div>

<script>
/* =====================================================
   顏色資料（含注音＋英文）
   ===================================================== */
const COLORS=[
  {name:'紅',zhuyin:'ㄏㄨㄥˊ',en:'Red',   body:'#e74c3c',belly:'#ff8a80',bg:'#e74c3c',fg:'#fff'},
  {name:'黃',zhuyin:'ㄏㄨㄤˊ',en:'Yellow',body:'#f1c40f',belly:'#fff59d',bg:'#f1c40f',fg:'#3a2a1a'},
  {name:'藍',zhuyin:'ㄌㄢˊ',  en:'Blue',  body:'#2980b9',belly:'#80d8ff',bg:'#2980b9',fg:'#fff'},
  {name:'綠',zhuyin:'ㄌㄩˋ',  en:'Green', body:'#27ae60',belly:'#b9f6ca',bg:'#27ae60',fg:'#fff'},
  {name:'橘',zhuyin:'ㄐㄩˊ',  en:'Orange',body:'#e67e22',belly:'#ffcc80',bg:'#e67e22',fg:'#fff'},
  {name:'紫',zhuyin:'ㄗˇ',    en:'Purple',body:'#8e44ad',belly:'#e1bee7',bg:'#8e44ad',fg:'#fff'},
  {name:'粉',zhuyin:'ㄈㄣˇ',  en:'Pink',  body:'#fd79a8',belly:'#fce4ec',bg:'#fd79a8',fg:'#3a2a1a'},
  {name:'白',zhuyin:'ㄅㄞˊ',  en:'White', body:'#d0d0d0',belly:'#f8f8f8',bg:'#e0e0e0',fg:'#3a2a1a'},
  {name:'咖',zhuyin:'ㄎㄚ',   en:'Brown', body:'#8d6e63',belly:'#d7ccc8',bg:'#8d6e63',fg:'#fff'},
  {name:'黑',zhuyin:'ㄏㄟ',   en:'Black', body:'#424242',belly:'#78909c',bg:'#2d3436',fg:'#fff'},
];

/* =====================================================
   SVG 變色龍
   ===================================================== */
function buildCham(body,belly,size){
  const ol='#5a4a3a', w=size, h=Math.round(size*.95);
  const uid=body.replace('#','')+w;
  return `<svg viewBox="0 0 120 114" xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" style="display:block;overflow:visible">
  <defs>
    <radialGradient id="rg${uid}" cx="45%" cy="38%" r="55%">
      <stop offset="0%" stop-color="${belly}" stop-opacity=".9"/>
      <stop offset="100%" stop-color="${body}" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="72" cy="82" r="22" fill="${body}" stroke="${ol}" stroke-width="4"/>
  <path d="M72 82 m0-14 a14 14 0 1 1-.1 0 m0 7 a7 7 0 1 1-.05 0 m0 3.5 a3.5 3.5 0 1 1-.03 0"
    fill="none" stroke="${ol}" stroke-width="2.2" stroke-linecap="round" opacity=".65"/>
  <ellipse cx="50" cy="60" rx="30" ry="22" fill="${body}" stroke="${ol}" stroke-width="4" stroke-linejoin="round"/>
  <ellipse cx="50" cy="62" rx="20" ry="13" fill="url(#rg${uid})"/>
  <path d="M34 57 Q40 50 46 57" fill="none" stroke="${ol}" stroke-width="1.8" stroke-linecap="round" opacity=".45"/>
  <path d="M46 55 Q52 48 58 55" fill="none" stroke="${ol}" stroke-width="1.8" stroke-linecap="round" opacity=".45"/>
  <path d="M58 57 Q64 50 70 57" fill="none" stroke="${ol}" stroke-width="1.8" stroke-linecap="round" opacity=".38"/>
  <polygon points="28,52 31,40 34,52" fill="${body}" stroke="${ol}" stroke-width="2.4" stroke-linejoin="round"/>
  <polygon points="37,48 40,35 43,48" fill="${body}" stroke="${ol}" stroke-width="2.4" stroke-linejoin="round"/>
  <polygon points="46,46 49,33 52,46" fill="${body}" stroke="${ol}" stroke-width="2.4" stroke-linejoin="round"/>
  <polygon points="55,48 58,37 61,48" fill="${body}" stroke="${ol}" stroke-width="2.4" stroke-linejoin="round"/>
  <ellipse cx="24" cy="54" rx="18" ry="15" fill="${body}" stroke="${ol}" stroke-width="4"/>
  <ellipse cx="13" cy="57" rx="4.5" ry="3" fill="#ffb3c6" opacity=".5"/>
  <circle cx="20" cy="43" r="10" fill="white" stroke="${ol}" stroke-width="3"/>
  <circle cx="21" cy="43" r="6.5" fill="#2d2d2d"/>
  <circle cx="23" cy="41" r="2.5" fill="white"/>
  <circle cx="19" cy="45" r="1.2" fill="white" opacity=".62"/>
  <path d="M7 53 Q0 50 -4 48" fill="none" stroke="${ol}" stroke-width="2.4" stroke-linecap="round"/>
  <circle cx="-4" cy="48" r="4.5" fill="#f87171" stroke="${ol}" stroke-width="1.8"/>
  <path d="M-4 48 m0-2.5 a2.5 2.5 0 1 1-.02 0" fill="none" stroke="${ol}" stroke-width="1.4" opacity=".68"/>
  <path d="M8 56 Q14 62 20 58" fill="none" stroke="${ol}" stroke-width="2.1" stroke-linecap="round"/>
  <path d="M36 70 Q30 78 26 80 M36 70 Q32 79 28 83 M36 70 Q35 79 33 83"
    fill="none" stroke="${ol}" stroke-width="4" stroke-linecap="round"/>
  <circle cx="25" cy="81" r="2.7" fill="${body}" stroke="${ol}" stroke-width="1.4"/>
  <circle cx="28" cy="84" r="2.7" fill="${body}" stroke="${ol}" stroke-width="1.4"/>
  <circle cx="33" cy="84" r="2.7" fill="${body}" stroke="${ol}" stroke-width="1.4"/>
  <path d="M57 70 Q62 78 65 80 M57 70 Q61 79 64 83 M57 70 Q57 79 55 83"
    fill="none" stroke="${ol}" stroke-width="4" stroke-linecap="round"/>
  <circle cx="65" cy="81" r="2.7" fill="${body}" stroke="${ol}" stroke-width="1.4"/>
  <circle cx="63" cy="84" r="2.7" fill="${body}" stroke="${ol}" stroke-width="1.4"/>
  <circle cx="55" cy="84" r="2.7" fill="${body}" stroke="${ol}" stroke-width="1.4"/>
</svg>`;
}

/* =====================================================
   FIX 3+4: Web Audio — 背景音樂 + 音效（分開開關）
   ===================================================== */
let actx=null;
function getActx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}

let bgmOn=true;   // 背景音樂開關
let sfxOn=true;   // 提示音效開關

/* ── 音效（SFX）── */
function tone(f,d,t='sine',v=.25){
  if(!sfxOn)return;
  try{const c=getActx(),o=c.createOscillator(),g=c.createGain();
  o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;
  g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);
  o.start();o.stop(c.currentTime+d)}catch(e){}
}
const sfx={
  correct:()=>{tone(600,.1,'sine',.3);setTimeout(()=>tone(900,.12,'sine',.27),90);setTimeout(()=>tone(1200,.22,'sine',.24),185)},
  wrong:  ()=>{tone(300,.12,'sawtooth',.22);setTimeout(()=>tone(180,.2,'sawtooth',.18),110)},
  count:  (g)=>{if(g){tone(880,.08,'sine',.34);setTimeout(()=>tone(1100,.12,'sine',.34),80);setTimeout(()=>tone(1320,.28,'sine',.28),170)}else tone(440,.14,'sine',.24)},
  ready:  ()=>[350,440,550].forEach((f,i)=>setTimeout(()=>tone(f,.13,'sine',.21),i*110)),
  end:    ()=>[880,660,440,330].forEach((f,i)=>setTimeout(()=>tone(f,.2,'sine',.25),i*120)),
};

/* ── 背景音樂：Web Audio 合成輕音樂 ──
   以 C 大調五音（C-E-G-A-C）循環旋律，
   加上輕柔的和弦墊音（pad）
   ===================================================== */
let bgmNodes=[];   // 正在播放的節點
let bgmSeqTimer=null;
let bgmRunning=false;

/* 旋律音符序列（頻率 Hz, 時值 sec）*/
const MELODY=[
  [523.25,.45],[659.25,.45],[783.99,.45],[880,.45],[1046.5,.9],
  [880,.45],[783.99,.45],[659.25,.45],[523.25,.9],
  [659.25,.45],[783.99,.45],[659.25,.45],[523.25,.45],[392,.9],
  [440,.45],[523.25,.45],[659.25,.45],[523.25,.45],[392,.9],
];
let melIdx=0;

/* 和弦墊音（低頻三和弦）*/
const PADS=[[261.63,329.63,392],[261.63,329.63,392],[196,246.94,293.66],[196,246.94,329.63]];
let padIdx=0;

function startBgm(){
  if(bgmRunning||!bgmOn)return;
  bgmRunning=true;
  try{getActx()}catch(e){return}
  playNextNote();
  schedulePad();
}

function stopBgm(){
  bgmRunning=false;
  if(bgmSeqTimer) clearTimeout(bgmSeqTimer);
  bgmSeqTimer=null;
  bgmNodes.forEach(n=>{try{n.stop()}catch(e){}});
  bgmNodes=[];
}

function playNextNote(){
  if(!bgmRunning||!bgmOn)return;
  const [freq,dur]=MELODY[melIdx%MELODY.length];
  melIdx++;
  try{
    const c=getActx();
    const osc=c.createOscillator();
    const gain=c.createGain();
    const filt=c.createBiquadFilter();
    filt.type='lowpass';filt.frequency.value=2200;
    osc.type='triangle';osc.frequency.value=freq;
    osc.connect(filt);filt.connect(gain);gain.connect(c.destination);
    gain.gain.setValueAtTime(0,c.currentTime);
    gain.gain.linearRampToValueAtTime(.12,c.currentTime+.04);
    gain.gain.setValueAtTime(.12,c.currentTime+dur*.7);
    gain.gain.exponentialRampToValueAtTime(.001,c.currentTime+dur);
    osc.start();osc.stop(c.currentTime+dur);
    bgmNodes.push(osc);
    osc.onended=()=>{bgmNodes=bgmNodes.filter(n=>n!==osc)};
  }catch(e){}
  bgmSeqTimer=setTimeout(playNextNote,(dur*1000)-20);
}

function schedulePad(){
  if(!bgmRunning||!bgmOn)return;
  const freqs=PADS[padIdx%PADS.length];
  padIdx++;
  freqs.forEach(freq=>{
    try{
      const c=getActx();
      const osc=c.createOscillator();
      const gain=c.createGain();
      osc.type='sine';osc.frequency.value=freq;
      osc.connect(gain);gain.connect(c.destination);
      gain.gain.setValueAtTime(0,c.currentTime);
      gain.gain.linearRampToValueAtTime(.035,c.currentTime+.3);
      gain.gain.setValueAtTime(.035,c.currentTime+1.6);
      gain.gain.exponentialRampToValueAtTime(.001,c.currentTime+2.2);
      osc.start();osc.stop(c.currentTime+2.2);
      bgmNodes.push(osc);
      osc.onended=()=>{bgmNodes=bgmNodes.filter(n=>n!==osc)};
    }catch(e){}
  });
  setTimeout(schedulePad,2200);
}

/* =====================================================
   防重疊位置
   ===================================================== */
function noOverlapPos(placed){
  const mg=6;
  const maxX=Math.max(0,arenaW-chamW-mg*2);
  const maxY=Math.max(0,arenaH-chamH-30);
  const minDX=chamW*(1-OVERLAP), minDY=chamH*(1-OVERLAP);
  for(let a=0;a<60;a++){
    const x=mg+Math.random()*maxX, y=mg+Math.random()*maxY;
    let ok=true;
    for(const p of placed){ if(Math.abs(x-p.x)<minDX&&Math.abs(y-p.y)<minDY){ok=false;break} }
    if(ok)return{x,y};
  }
  return{x:mg+Math.random()*maxX,y:mg+Math.random()*maxY};
}

/* =====================================================
   生成變色龍
   ===================================================== */
/* =====================================================
   buildColsWithTarget(n, targetColor)
   產生 n 個不重複顏色的陣列，且第一個一定是 targetColor。
   其餘從剩下 9 色中隨機取 n-1 個（不足補隨機）。
   ===================================================== */
function buildColsWithTarget(n, target){
  // 從其他 9 色隨機取 n-1 個
  const others = shuffle(COLORS.filter(c=>c.name!==target.name));
  const fill   = others.slice(0, Math.min(n-1, others.length));
  // 如果 n > 10，補足（極端情況）
  while(fill.length < n-1) fill.push(COLORS[Math.floor(Math.random()*COLORS.length)]);
  // 隨機插入 target 的位置
  const cols = [...fill];
  const insertAt = Math.floor(Math.random()*n);
  cols.splice(insertAt, 0, target);
  return cols.slice(0, n); // 確保長度為 n
}

function spawn(){
  const a=document.getElementById('arena');
  a.innerHTML='';chameleons=[];

  // 固定 10 隻，每種顏色各一隻，隨機排列
  const cols=shuffle([...COLORS]);

  // 先從 10 色中選題目（避免與上題相同）
  const pool=COLORS.filter(c=>!currentColor||c.name!==currentColor.name);
  currentColor=pool[Math.floor(Math.random()*pool.length)];

  const placed=[];
  cols.forEach(c=>{
    const pos=noOverlapPos(placed);placed.push(pos);
    const div=document.createElement('div');
    div.className='cham';
    div.style.left=pos.x+'px';div.style.top=pos.y+'px';
    div.style.width=chamW+'px';div.style.height=chamH+'px';
    div.innerHTML=buildCham(c.body,c.belly,chamW);
    div.dataset.c=c.name;
    div.addEventListener('click',onClik);
    a.appendChild(div);
    const ch={el:div,color:c,x:pos.x,y:pos.y};
    chameleons.push(ch);
    if(selMode==='challenge') startMove(ch);
  });

  renderQuestion();
}

function respawn(){
  // 10 隻各色重新隨機排列，位置全部刷新
  const cols=shuffle([...COLORS]);

  // 選新題目（避免連題相同）
  const pool=COLORS.filter(c=>c.name!==currentColor.name);
  currentColor=pool[Math.floor(Math.random()*pool.length)];

  const placed=[];
  chameleons.forEach((ch,i)=>{
    const pos=noOverlapPos(placed);placed.push(pos);
    ch.el.style.transition='none';
    ch.el.style.left=pos.x+'px';ch.el.style.top=pos.y+'px';
    ch.x=pos.x;ch.y=pos.y;
    ch.color=cols[i];ch.el.dataset.c=ch.color.name;
    ch.el.innerHTML=buildCham(ch.color.body,ch.color.belly,chamW);
  });

  renderQuestion();
}

/* =====================================================
   終極挑戰：移動速度依子模式決定
   慢速：1800–3000ms（非常緩慢移動）
   快速：800–1400ms（舊版慢速，適中節奏）
   ===================================================== */
function startMove(ch){
  const lo=chalSpeed==='fast'? 800:1800;
  const hi=chalSpeed==='fast'?1400:3000;
  const d=lo+Math.random()*(hi-lo);
  const tid=setInterval(()=>{
    if(!gameActive||isPaused)return;
    const others=chameleons.filter(c=>c!==ch).map(c=>{
      const cs=window.getComputedStyle(c.el);
      return{x:parseFloat(cs.left),y:parseFloat(cs.top)};
    });
    const pos=noOverlapPos(others);
    ch.el.style.transition=`left ${d*.88}ms ease-in-out,top ${d*.88}ms ease-in-out`;
    ch.el.style.left=pos.x+'px';ch.el.style.top=pos.y+'px';
    ch.x=pos.x;ch.y=pos.y;
  },d);
  moveTimers.push(tid);
}
function stopMoves(){
  moveTimers.forEach(t=>clearInterval(t));moveTimers=[];
  chameleons.forEach(ch=>{
    const cs=window.getComputedStyle(ch.el);
    ch.el.style.transition='none';
    ch.el.style.left=cs.left;ch.el.style.top=cs.top;
  });
}

/* =====================================================
   終極挑戰換題：全部 10 隻龍瞬間換色（新的一批），
   移動不中斷，位置不凍結。
   ===================================================== */
function pickNextForChallenge(){
  // 選新題目（避免連題相同）
  const pool=COLORS.filter(c=>c.name!==currentColor.name);
  currentColor=pool[Math.floor(Math.random()*pool.length)];

  // 10 隻龍重新隨機分配顏色（每色各一隻，shuffle）
  const cols=shuffle([...COLORS]);
  chameleons.forEach((ch,i)=>{
    ch.color=cols[i];
    ch.el.dataset.c=ch.color.name;
    ch.el.innerHTML=buildCham(ch.color.body,ch.color.belly,chamW);
    // 移動 timer 繼續跑，不重啟

/* =====================================================
   點擊事件
   ===================================================== */
function onClik(e){
  if(!gameActive||isPaused)return;
  const w=e.currentTarget;
  if(w.dataset.c===currentColor.name){
    scoreOk++;updateScore();sfx.correct();
    spawnStar(e.clientX,e.clientY);
    w.classList.remove('wrong-s');w.classList.add('correct-f');
    w.addEventListener('animationend',()=>w.classList.remove('correct-f'),{once:true});
    if(selMode==='normal'){
      // 標準模式：respawn() 已內建選新題目 + 保證答案在場
      setTimeout(()=>{if(!gameActive)return;respawn();},330);
    } else {
      // 終極挑戰：龍繼續跑，只換題目並確保答案在場
      setTimeout(()=>{if(!gameActive)return;pickNextForChallenge();},200);
    }
  } else {
    scoreErr++;updateScore();sfx.wrong();
    spawnX(e.clientX,e.clientY);
    w.classList.remove('correct-f');w.classList.add('wrong-s');
    w.addEventListener('animationend',()=>w.classList.remove('wrong-s'),{once:true});
  }
}

  const s=document.createElement('div');s.className='xPop';
  s.innerHTML=`<svg viewBox="0 0 24 24" width="28" height="28" stroke="#ef4444" stroke-width="3" stroke-linecap="round">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
  s.style.left=(x+(Math.random()-.5)*20)+'px';s.style.top=y+'px';
  document.body.appendChild(s);setTimeout(()=>s.remove(),700);
}

/* =====================================================
   分數 & 計時
   ===================================================== */
function updateScore(){
  const ok=document.getElementById('scoreOk');
  ok.textContent=scoreOk;ok.classList.remove('bump-ok');void ok.offsetWidth;ok.classList.add('bump-ok');
  const err=document.getElementById('scoreErr');
  err.textContent=scoreErr;
  if(scoreErr>0){err.classList.remove('bump-err');void err.offsetWidth;err.classList.add('bump-err');}
}
function updateTimer(){
  const el=document.getElementById('timerNum');
  el.textContent=timeLeft;el.classList.toggle('urgent',timeLeft<=10);
}

/* =====================================================
   遊戲結束
   ===================================================== */
function endGame(){
  gameActive=false;isPaused=false;
  clearInterval(gameTimer);stopMoves();
  document.getElementById('pauseOverlay').classList.remove('active');
  sfx.end();
  const isC=selMode==='challenge',isFast=isC&&chalSpeed==='fast';
  setTimeout(()=>{
    document.getElementById('finalOk').textContent=scoreOk;
    document.getElementById('finalErr').textContent=scoreErr;
    const tag=document.getElementById('resTag');
    if(!isC){ tag.className='res-tag'; tag.innerHTML=`<svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><path d="M17 8C8 10 5.9 16.17 3.82 19.24L5.71 21l1-1C9 19 12 17 12 17s-2 2-2 5h2c0-3 2-5 5-7s3-7 0-7z"/></svg>標準模式`; }
    else if(!isFast){ tag.className='res-tag chal-slow'; tag.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" width="12" height="12"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>終極・慢速`; }
    else { tag.className='res-tag chal-fast'; tag.innerHTML=`<svg viewBox="0 0 24 24" fill="currentColor" width="12" height="12"><polygon points="13,2 3,14 12,14 11,22 21,10 12,10"/></svg>終極・快速`; }
    document.getElementById('resMsg').textContent=getMsg(scoreOk,scoreErr,selTime,isC,isFast);
    document.getElementById('resMascot').innerHTML=buildCham(COLORS[1].body,COLORS[1].belly,88);
    showScreen('result');
  },430);
}
function getMsg(ok,err,t,isC,isFast){
  const acc=ok+err>0?Math.round(ok/(ok+err)*100):0;
  const rate=ok/(t/10);
  const aStr=`  正確率 ${acc}%`;
  if(!isC) return rate>=6?`超級厲害！變色龍大師！${aStr}`:rate>=4?`非常棒！反應超快！${aStr}`:rate>=2?`做得好！繼續加油！${aStr}`:`很棒！下次更好！${aStr}`;
  if(isFast) return rate>=5?`太驚人！極速變色龍王！${aStr}`:rate>=3?`超強！閃電反應！${aStr}`:rate>=1.5?`厲害！快速模式超難！${aStr}`:`很棒！繼續挑戰！${aStr}`;
  return rate>=5?`太驚人！終極變色龍王！${aStr}`:rate>=3?`超強！反應像閃電！${aStr}`:rate>=1.5?`厲害！終極不簡單！${aStr}`:`很棒！繼續挑戰！${aStr}`;
}

/* =====================================================
   工具
   ===================================================== */
function randColors(n){
  const p=shuffle([...COLORS]);const r=p.slice(0,Math.min(n,10));
  while(r.length<n)r.push(COLORS[Math.floor(Math.random()*10)]);return r;
}
function shuffle(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
  return a;
}

/* =====================================================
   啟動
   ===================================================== */
initBg();initIcons();updateAudioBtns();showScreen('start');
document.addEventListener('dblclick',e=>e.preventDefault());
// 使用者第一次互動解鎖 AudioContext，然後自動播放音樂
document.addEventListener('pointerdown',()=>{
  try{ getActx().resume().then(()=>startBgm()); }catch(e){}
},{once:true});
document.addEventListener('touchstart',()=>{
  try{ getActx().resume().then(()=>startBgm()); }catch(e){}
},{once:true});
